name: 기능 제안
description: 새로운 기능이나 개선 방향을 제안해 주세요. 한국어 또는 영어로 작성할 수 있습니다.
title: "[기능] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        제안하려는 문제가 기존 Milestone 또는 Issue에 포함되어 있는지 먼저 확인해 주세요.

  - type: textarea
    id: problem
    attributes:
      label: 해결하려는 문제
      description: 기능 자체보다 현재 겪는 문제와 사용 사례를 먼저 설명해 주세요.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 제안 내용
      description: 원하는 동작과 예상 사용 흐름을 설명해 주세요.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 검토한 대안
      description: 현재 가능한 우회 방법이나 비교한 대안이 있다면 작성해 주세요.

  - type: textarea
    id: additional
    attributes:
      label: 추가 자료
      description: 스케치, 예제 설정, 관련 저장소 또는 참고 링크를 첨부할 수 있습니다.

  - type: checkboxes
    id: checklist
    attributes:
      label: 확인 사항
      options:
        - label: 동일하거나 유사한 제안이 이미 등록되어 있는지 검색했습니다.
          required: true
        - label: GitHub README에서 사용자 JavaScript와 CSS가 제한된다는 점을 고려했습니다.
          required: true
